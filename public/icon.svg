<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Board Base -->
  <rect x="10" y="10" width="100" height="100" rx="16" fill="#1e293b" />
  
  <!-- Outer border traces -->
  <rect x="18" y="18" width="84" height="84" rx="8" fill="none" stroke="#f97316" stroke-width="3" opacity="0.8"/>
  
  <!-- Diagonal Tape / Traces -->
  <path d="M 30,90 L 30,60 L 60,30 L 90,30" fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 50,90 L 50,75 L 75,50 L 90,50" fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 30,30 L 70,70" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>

  <!-- Drill Holes / Vias -->
  <circle cx="30" cy="90" r="8" fill="#1e293b" stroke="#22c55e" stroke-width="4"/>
  <circle cx="90" cy="30" r="8" fill="#1e293b" stroke="#22c55e" stroke-width="4"/>
  <circle cx="90" cy="50" r="8" fill="#1e293b" stroke="#22c55e" stroke-width="4"/>
  <circle cx="50" cy="90" r="8" fill="#1e293b" stroke="#22c55e" stroke-width="4"/>
  <circle cx="30" cy="30" r="6" fill="#1e293b" stroke="#f97316" stroke-width="3"/>
  <circle cx="70" cy="70" r="6" fill="#1e293b" stroke="#f97316" stroke-width="3"/>
</svg>
